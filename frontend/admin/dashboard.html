<!DOCTYPE html>
<html lang="en" data-theme="lemonade">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | MedCore</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.3/dist/full.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-base-200">
<nav class="navbar bg-base-100/60 backdrop-blur-lg sticky top-0 z-50 border-b border-base-content/10 px-4 lg:px-8 shadow-sm">

<div class="flex-1 gap-3">

<!-- BACK BUTTON -->
<button onclick="goBack()" class="btn btn-ghost btn-circle">
<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
</svg>
</button>

<!-- HOME BUTTON -->
<a href="../index.html" class="btn btn-ghost btn-circle">
<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
</svg>
</a>

<!-- LOGO -->
<div class="bg-primary text-primary-content p-2 rounded-2xl shadow-sm ml-2">
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
<path stroke-linecap="round" stroke-linejoin="round" d="M21 10.5h.375c.621 0 1.125.504 1.125 1.125v2.25c0 .621-.504 1.125-1.125 1.125H21M4.5 10.5v6.75c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125v-6.75M12 4.5v15m0-15A2.25 2.25 0 0 0 9.75 6.75v.75m2.25-3a2.25 2.25 0 0 1 2.25 2.25v.75m-4.5 0h4.5"/>
</svg>
</div>

<span class="text-2xl font-extrabold tracking-tight">
Med<span class="text-primary">Core</span>
</span>

</div>

</nav>
<div class="flex min-h-screen">

<!-- SIDEBAR -->

<aside class="w-64 bg-base-100 border-r h-screen sticky top-0 flex flex-col">

<div class="p-6 text-2xl font-bold ">
    <span class="text-2xl font-extrabold tracking-tight">Med<span class="text-primary">Core</span></span>
</div>

<ul class="menu p-4 text-base flex-1">

<li><a class="active">Dashboard</a></li>
<li><a href="doctors.html">Doctors</a></li>
<li><a href="patients.html">Patients</a></li>
<li><a href="appointments.html">Appointments</a></li>
<li><a href="bills.html">Billing</a></li>
<li><a href="departments.html">Departments</a></li>

</ul>

</aside>

<!-- MAIN AREA -->

<main class="flex-1 p-8">

<h1 class="text-3xl font-bold mb-8">Dashboard</h1>

<!-- STAT CARDS -->

<div class="grid grid-cols-4 gap-6 mb-10">

<div class="stat bg-base-100 rounded-xl shadow">
<div class="stat-title">Doctors</div>
<div id="doctorCount" class="stat-value text-primary">0</div>
</div>

<div class="stat bg-base-100 rounded-xl shadow">
<div class="stat-title">Patients</div>
<div id="patientCount" class="stat-value text-secondary">0</div>
</div>

<div class="stat bg-base-100 rounded-xl shadow">
<div class="stat-title">Appointments</div>
<div id="appointmentCount" class="stat-value">0</div>
</div>

<div class="stat bg-base-100 rounded-xl shadow">
<div class="stat-title">Revenue</div>
<div id="revenueCount" class="stat-value text-success">₹0</div>
</div>

</div>

<!-- CHART AREA -->

<div class="grid grid-cols-2 gap-8">

<div class="card bg-base-100 shadow p-6">

<h2 class="text-lg font-semibold mb-4">
Appointments Trend
</h2>

<canvas id="appointmentChart"></canvas>

</div>

<div class="card bg-base-100 shadow p-6">

<h2 class="text-lg font-semibold mb-4">
Revenue Overview
</h2>

<canvas id="revenueChart"></canvas>

</div>

</div>

</main>

</div>

<script src="../js/dashboard.js"></script>
<script>
function goBack(){
window.history.back();
}
</script>

</body>
</html>
