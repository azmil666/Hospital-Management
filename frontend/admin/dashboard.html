<!DOCTYPE html>
<html lang="en" data-theme="lemonade">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | MedCore</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.3/dist/full.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-base-200">

<div class="flex min-h-screen">

<!-- SIDEBAR -->

<aside class="w-64 bg-base-100 border-r h-screen sticky top-0 flex flex-col">

<div class="p-6 text-2xl font-bold text-primary">
MedCore
</div>

<ul class="menu p-4 text-base flex-1">

<li><a class="active">Dashboard</a></li>
<li><a href="doctors.html">Doctors</a></li>
<li><a href="patients.html">Patients</a></li>
<li><a href="appointments.html">Appointments</a></li>
<li><a href="bills.html">Billing</a></li>
<li><a href="departments.html">Departments</a></li>

</ul>

</aside>

<!-- MAIN AREA -->

<main class="flex-1 p-8">

<h1 class="text-3xl font-bold mb-8">Dashboard</h1>

<!-- STAT CARDS -->

<div class="grid grid-cols-4 gap-6 mb-10">

<div class="stat bg-base-100 rounded-xl shadow">
<div class="stat-title">Doctors</div>
<div id="doctorCount" class="stat-value text-primary">0</div>
</div>

<div class="stat bg-base-100 rounded-xl shadow">
<div class="stat-title">Patients</div>
<div id="patientCount" class="stat-value text-secondary">0</div>
</div>

<div class="stat bg-base-100 rounded-xl shadow">
<div class="stat-title">Appointments</div>
<div id="appointmentCount" class="stat-value">0</div>
</div>

<div class="stat bg-base-100 rounded-xl shadow">
<div class="stat-title">Revenue</div>
<div id="revenueCount" class="stat-value text-success">₹0</div>
</div>

</div>

<!-- CHART AREA -->

<div class="grid grid-cols-2 gap-8">

<div class="card bg-base-100 shadow p-6">

<h2 class="text-lg font-semibold mb-4">
Appointments Trend
</h2>

<canvas id="appointmentChart"></canvas>

</div>

<div class="card bg-base-100 shadow p-6">

<h2 class="text-lg font-semibold mb-4">
Revenue Overview
</h2>

<canvas id="revenueChart"></canvas>

</div>

</div>

</main>

</div>

<script src="../js/dashboard.js"></script>

</body>
</html>
