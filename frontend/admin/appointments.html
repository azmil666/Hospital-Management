<!DOCTYPE html>
<html lang="en" data-theme="lemonade">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Appointments | MedCore</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.3/dist/full.min.css" rel="stylesheet">

</head>

<body class="bg-base-200">

<div class="flex min-h-screen">

<!-- SIDEBAR -->
<aside class="w-64 bg-base-100 border-r h-screen sticky top-0 flex flex-col">

<div class="p-6 text-2xl font-bold text-primary">
MedCore
</div>

<ul class="menu p-4 text-base flex-1">

<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="doctors.html">Doctors</a></li>
<li><a href="patients.html">Patients</a></li>
<li><a class="active">Appointments</a></li>
<li><a href="bills.html">Billing</a></li>
<li><a href="departments.html">Departments</a></li>

</ul>

</aside>

<!-- MAIN -->

<main class="flex-1 p-8">

<h1 class="text-3xl font-bold mb-8">Appointments</h1>

<!-- CREATE APPOINTMENT -->

<div class="card bg-base-100 shadow p-6 mb-8">

<h2 class="text-xl font-semibold mb-4">Create Appointment</h2>

<div class="grid grid-cols-3 gap-4">

<select id="patientSelect" class="select select-bordered">
<option disabled selected>Select Patient</option>
</select>

<select id="doctorSelect" class="select select-bordered">
<option disabled selected>Select Doctor</option>
</select>

<input id="appointmentDate" type="date" class="input input-bordered">

</div>

<button onclick="createAppointment()" class="btn btn-primary mt-4">
Create Appointment
</button>

</div>

<!-- APPOINTMENTS TABLE -->

<div class="card bg-base-100 shadow p-6">

<h2 class="text-xl font-semibold mb-4">Appointment List</h2>

<table class="table w-full">

<thead>
<tr>
<th>ID</th>
<th>Patient</th>
<th>Doctor</th>
<th>Date</th>
<th>Status</th>
</tr>
</thead>

<tbody id="appointmentTable"></tbody>

</table>

</div>

</main>

</div>

<script src="../js/appointments.js"></script>

</body>
</html>
