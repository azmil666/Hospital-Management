<!DOCTYPE html>
<html lang="en" data-theme="lemonade">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Billing | MedCore</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.3/dist/full.min.css" rel="stylesheet">

</head>

<body class="bg-base-200">

<div class="flex min-h-screen">

<!-- SIDEBAR -->

<aside class="w-64 bg-base-100 border-r h-screen sticky top-0 flex flex-col">

<div class="p-6 text-2xl font-bold text-primary">
MedCore
</div>

<ul class="menu p-4 text-base flex-1">

<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="doctors.html">Doctors</a></li>
<li><a href="patients.html">Patients</a></li>
<li><a href="appointments.html">Appointments</a></li>
<li><a class="active">Billing</a></li>
<li><a href="departments.html">Departments</a></li>

</ul>

</aside>

<!-- MAIN -->

<main class="flex-1 p-8">

<h1 class="text-3xl font-bold mb-8">Billing</h1>

<!-- CREATE BILL -->

<div class="card bg-base-100 shadow p-6 mb-8">

<h2 class="text-xl font-semibold mb-4">Generate Bill</h2>

<div class="grid grid-cols-3 gap-4">

<select id="appointmentSelect" class="select select-bordered">
<option disabled selected>Select Appointment</option>
</select>

<input id="billAmount" type="number" class="input input-bordered" placeholder="Amount">

<input id="billDate" type="date" class="input input-bordered">

</div>

<button onclick="createBill()" class="btn btn-primary mt-4">
Generate Bill
</button>

</div>

<!-- BILL TABLE -->

<div class="card bg-base-100 shadow p-6">

<h2 class="text-xl font-semibold mb-4">Bills</h2>

<table class="table w-full">

<thead>
<tr>
<th>ID</th>
<th>Patient</th>
<th>Amount</th>
<th>Date</th>
</tr>
</thead>

<tbody id="billTable"></tbody>

</table>

</div>

</main>

</div>

<script src="../js/bills.js"></script>

</body>
</html>
