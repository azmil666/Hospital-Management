<!DOCTYPE html>
<html lang="en" data-theme="lemonade">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doctors | MedCore</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.3/dist/full.min.css" rel="stylesheet">

</head>

<body class="bg-base-200">

<div class="flex min-h-screen">

<!-- SIDEBAR -->

<aside class="w-64 bg-base-100 border-r h-screen sticky top-0 flex flex-col">

<div class="p-6 text-2xl font-bold text-primary">
MedCore
</div>

<ul class="menu p-4 text-base flex-1">

<li><a href="dashboard.html">Dashboard</a></li>
<li><a class="active">Doctors</a></li>
<li><a href="patients.html">Patients</a></li>
<li><a href="appointments.html">Appointments</a></li>
<li><a href="bills.html">Billing</a></li>
<li><a href="departments.html">Departments</a></li>

</ul>

</aside>

<!-- MAIN -->

<main class="flex-1 p-8">

<h1 class="text-3xl font-bold mb-8">Doctors Management</h1>

<!-- ADD DOCTOR FORM -->

<div class="card bg-base-100 shadow p-6 mb-8">

<h2 class="text-xl font-semibold mb-4">Add Doctor</h2>

<div class="grid grid-cols-3 gap-4">

<input id="doctorName" type="text" placeholder="Doctor Name" class="input input-bordered">

<input id="specialization" type="text" placeholder="Specialization" class="input input-bordered">

<select id="departmentSelect" class="select select-bordered">
<option disabled selected>Select Department</option>
</select>

</div>

<button onclick="addDoctor()" class="btn btn-primary mt-4">
Add Doctor
</button>

</div>

<!-- DOCTORS TABLE -->

<div class="card bg-base-100 shadow p-6">

<h2 class="text-xl font-semibold mb-4">Doctors List</h2>

<table class="table w-full">

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Specialization</th>
<th>Department</th>
</tr>
</thead>

<tbody id="doctorTable">
</tbody>

</table>

</div>

</main>

</div>

<script src="../js/doctors.js"></script>

</body>
</html>
