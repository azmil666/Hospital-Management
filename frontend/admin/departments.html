<!DOCTYPE html>
<html lang="en" data-theme="lemonade">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Departments | MedCore</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.3/dist/full.min.css" rel="stylesheet">
</head>

<body class="bg-base-200">

<!-- NAVBAR -->
<nav class="navbar bg-base-100/60 backdrop-blur-lg sticky top-0 z-50 border-b border-base-content/10 px-4 lg:px-8 shadow-sm">
  <div class="flex-1 gap-3">
    <button onclick="goBack()" class="btn btn-ghost btn-circle">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
    <a href="../index.html" class="btn btn-ghost btn-circle">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
      </svg>
    </a>
    <div class="bg-primary text-primary-content p-2 rounded-2xl shadow-sm ml-2">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 10.5h.375c.621 0 1.125.504 1.125 1.125v2.25c0 .621-.504 1.125-1.125 1.125H21M4.5 10.5v6.75c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125v-6.75M12 4.5v15m0-15A2.25 2.25 0 0 0 9.75 6.75v.75m2.25-3a2.25 2.25 0 0 1 2.25 2.25v.75m-4.5 0h4.5"/>
      </svg>
    </div>
    <span class="text-2xl font-extrabold tracking-tight">Med<span class="text-primary">Core</span></span>
  </div>
</nav>

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-base-100 border-r h-screen sticky top-0 flex flex-col">
    <div class="p-6">
      <span class="text-2xl font-extrabold tracking-tight">Med<span class="text-primary">Core</span></span>
    </div>
    <ul class="menu p-4 text-base flex-1">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="doctors.html">Doctors</a></li>
      <li><a href="patients.html">Patients</a></li>
      <li><a href="appointments.html">Appointments</a></li>
      <li><a href="bills.html">Billing</a></li>
      <li><a class="active">Departments</a></li>
    </ul>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 p-8">

    <h1 class="text-3xl font-bold mb-8">Departments</h1>

    <!-- ADD DEPARTMENT FORM -->
    <div class="card bg-base-100 shadow p-6 mb-8">

      <h2 class="text-xl font-semibold mb-4">Add Department</h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <input
          id="departmentName"
          type="text"
          placeholder="Department Name *"
          class="input input-bordered w-full"
        />

        <input
          id="departmentHead"
          type="text"
          placeholder="Department Head (e.g. Dr. Smith)"
          class="input input-bordered w-full"
        />

      </div>

      <button onclick="addDepartment()" class="btn btn-primary mt-4 w-fit">
        Add Department
      </button>

    </div>

    <!-- DEPARTMENTS TABLE -->
    <div class="card bg-base-100 shadow p-6">

      <h2 class="text-xl font-semibold mb-4">Department List</h2>

      <div class="overflow-x-auto">
        <table class="table w-full">
          <thead>
            <tr>
              <th>ID</th>
              <th>Department Name</th>
              <th>Department Head</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="departmentTable"></tbody>
        </table>
      </div>

    </div>

  </main>

</div>

<!-- EDIT MODAL -->
<dialog id="editModal" class="modal">
  <div class="modal-box max-w-md">

    <h3 class="font-bold text-lg mb-4">Edit Department</h3>

    <input type="hidden" id="editDepartmentId" />

    <div class="flex flex-col gap-4">

      <div class="form-control">
        <label class="label"><span class="label-text">Department Name *</span></label>
        <input id="editDepartmentName" type="text" class="input input-bordered" />
      </div>

      <div class="form-control">
        <label class="label"><span class="label-text">Department Head</span></label>
        <input id="editDepartmentHead" type="text" class="input input-bordered" />
      </div>

    </div>

    <div class="modal-action">
      <button onclick="saveEdit()" class="btn btn-primary">Save Changes</button>
      <button onclick="document.getElementById('editModal').close()" class="btn">Cancel</button>
    </div>

  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<script src="../js/departments.js"></script>
<script>
  function goBack() { window.history.back(); }
</script>

</body>
</html>
